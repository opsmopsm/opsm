<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPSM AI Creative Base</title>
    <meta name="description" content="OPSM(おぽ)によるAIを使った創作活動をまとめたポートフォリオサイト">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Sans+JP:wght@400;700;800&family=Outfit:wght@500;800&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- JS SPA Engine -->
    <script src="js/app.js?v=4" defer></script>
</head>
<body>
    <div id="stars"></div>
    <div id="stars2"></div>
    <div id="stars3"></div>
    
    <div class="blob blob-blue"></div>
    <div class="blob blob-purple"></div>

    <header class="glass-header">
        <div class="header-container">
            <a href="#" class="logo nav-link" data-path="home">OPSM <span>AI Lab</span></a>
            <nav class="desktop-nav">
                <a href="#" class="nav-link" data-path="home">Home</a>
                <a href="#" class="nav-link" data-path="about">About</a>
                <a href="#" class="nav-link" data-path="music">Music</a>
                <a href="#" class="nav-link" data-path="art">Art</a>
                <a href="#" class="nav-link" data-path="movie">Movie</a>
                <a href="#" class="nav-link" data-path="series">Series</a>
                <a href="#" class="nav-link" data-path="links">Links</a>
            </nav>
            <button class="mobile-menu-btn" aria-label="Toggle Menu">
                <i data-lucide="menu"></i>
            </button>
        </div>
        <nav class="mobile-nav">
            <a href="#" class="nav-link" data-path="home">Home</a>
            <a href="#" class="nav-link" data-path="about">About</a>
            <a href="#" class="nav-link" data-path="music">Music</a>
            <a href="#" class="nav-link" data-path="art">Art</a>
            <a href="#" class="nav-link" data-path="movie">Movie</a>
            <a href="#" class="nav-link" data-path="series">Series</a>
            <a href="#" class="nav-link" data-path="links">Links</a>
        </nav>
    </header>

    <main id="app-root" class="page-transition" style="min-height: 80vh;">
        <!-- Views will be injected here -->
    </main>

    <!-- Global Footer for Links -->
    <footer style="text-align: center; padding: 40px 20px 120px; border-top: 1px solid var(--border-glass); background: rgba(10,10,15,0.8);">
        <h3 style="color: var(--text-secondary); margin-bottom: 20px;">External Links</h3>
        <div style="display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;">
             <a href="https://suno.com/@opsm" target="_blank" style="padding: 10px 20px; background: #333; color: white; border-radius: 8px;">Suno</a>
             <a href="https://www.youtube.com/@OPSM_opsm" target="_blank" style="padding: 10px 20px; background: #c4302b; color: white; border-radius: 8px;">YouTube</a>
             <a href="https://www.tiktok.com/@opsm_opsm" target="_blank" style="padding: 10px 20px; background: #000; color: white; border-radius: 8px; border: 1px solid #333;">TikTok</a>
             <a href="https://www.chichi-pui.com/" target="_blank" style="padding: 10px 20px; background: #2b70c4; color: white; border-radius: 8px;">ちちぷい</a>
             <a href="https://www.aipictors.com/users/7218661c-88a6-f43e-5a90-08c52fb4da4d" target="_blank" style="padding: 10px 20px; background: #2bc490; color: white; border-radius: 8px;">あいぴく</a>
             <a href="https://note.com/opsm" target="_blank" style="padding: 10px 20px; background: #2bc47e; color: white; border-radius: 8px;">Note</a>
             <a href="https://x.com/OPSM_opsm" target="_blank" style="padding: 10px 20px; background: #1da1f2; color: white; border-radius: 8px;">X (Twitter)</a>
        </div>
        <p style="margin-top: 30px; font-size: 0.9rem; color: #666;">&copy; 2026 OPSM AI Creative Base</p>
    </footer>

    <!-- Fixed Global Audio Player -->
    <div id="global-player" class="global-player hidden">
        <div class="player-content">
            <div class="player-info">
                <img id="player-thumb" src="" alt="Album Art">
                <div class="player-text">
                    <h4 id="player-title">Select a track</h4>
                    <span id="player-artist">OPSM</span>
                </div>
            </div>
            <div class="player-controls">
                <audio id="main-audio" controls controlsList="nodownload"></audio>
            </div>
            <button class="player-close" aria-label="Close Player" onclick="closePlayer()">
                <i data-lucide="x"></i>
            </button>
        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox">
        <button class="lightbox-close"><i data-lucide="x"></i></button>
        <img class="lightbox-content" id="lightbox-img" alt="Gallery">
    </div>

    <!-- Video Modal -->
    <div id="video-modal" class="lightbox">
        <button class="lightbox-close" onclick="closeVideoModal()"><i data-lucide="x"></i></button>
        <video id="video-modal-content" class="lightbox-content" controls style="background: black; border-radius: 12px; width: 90%; max-width: 800px;"></video>
    </div>

    <!-- Discography Modal -->
    <div id="disco-modal" class="disco-modal">
        <div class="disco-modal-content">
            <button class="disco-modal-close" onclick="closeDiscoModal()"><i data-lucide="x"></i></button>
            <img id="disco-modal-img" class="disco-modal-img" src="" alt="Cover Art">
            <div class="disco-modal-info">
                <h3 id="disco-modal-title" class="disco-modal-title">Track Title</h3>
                <div id="disco-modal-date" class="disco-modal-date">Release Date</div>
                <div style="display: flex; gap: 15px; margin-top: 20px; flex-wrap: wrap;">
                    <button id="disco-modal-play" class="disco-modal-play">
                        <i data-lucide="play-circle"></i> ▶ PLAY
                    </button>
                    <a id="disco-modal-suno" class="disco-modal-suno" href="#" target="_blank" style="display: none;">
                        <img src="assets/links/SUNO/Suno.png" alt="Suno" style="height: 20px;"> Listen on Suno
                    </a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
